openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bills
    description: Electricity bill processing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bills/process:
    post:
      operationId: processBills
      tags: [bills]
      summary: Process one or more electricity bill files (PDF or images)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - files
      responses:
        "200":
          description: Extracted bill data and Excel report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillProcessResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MonthlyEntry:
      type: object
      properties:
        month:
          type: string
          description: "ISO date string, e.g. 2026-01-01"
        consumer1Units:
          type: ["number", "null"]
        consumer1Bill:
          type: ["number", "null"]
        consumer2Units:
          type: ["number", "null"]
        consumer2Bill:
          type: ["number", "null"]
      required:
        - month
        - consumer1Units
        - consumer1Bill
        - consumer2Units
        - consumer2Bill
    BillProcessResult:
      type: object
      properties:
        consumer1Name:
          type: ["string", "null"]
        consumer1Number:
          type: ["string", "null"]
        consumer1Load:
          type: ["number", "null"]
        consumer1Connection:
          type: ["string", "null"]
        consumer2Name:
          type: ["string", "null"]
        consumer2Number:
          type: ["string", "null"]
        consumer2Load:
          type: ["number", "null"]
        consumer2Connection:
          type: ["string", "null"]
        monthlyData:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyEntry"
        totalFilesProcessed:
          type: integer
        excelBase64:
          type: string
        excelFilename:
          type: string
      required:
        - consumer1Name
        - consumer1Number
        - consumer1Load
        - consumer1Connection
        - consumer2Name
        - consumer2Number
        - consumer2Load
        - consumer2Connection
        - monthlyData
        - totalFilesProcessed
        - excelBase64
        - excelFilename
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
