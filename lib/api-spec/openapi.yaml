openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bills
    description: Electricity bill processing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bills/process:
    post:
      operationId: processBill
      tags: [bills]
      summary: Process electricity bill (PDF or image)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Extracted bill data and Excel report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillProcessResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BillProcessResult:
      type: object
      properties:
        unitsConsumed:
          type: ["number", "null"]
        connectedLoad:
          type: ["number", "null"]
        tariffType:
          type: ["string", "null"]
        billMonth:
          type: ["string", "null"]
        recommendedSolarKw:
          type: ["number", "null"]
        estimatedMonthlySavings:
          type: ["number", "null"]
        paybackPeriodYears:
          type: ["number", "null"]
        excelBase64:
          type: string
        excelFilename:
          type: string
      required:
        - unitsConsumed
        - connectedLoad
        - tariffType
        - billMonth
        - recommendedSolarKw
        - estimatedMonthlySavings
        - paybackPeriodYears
        - excelBase64
        - excelFilename
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
