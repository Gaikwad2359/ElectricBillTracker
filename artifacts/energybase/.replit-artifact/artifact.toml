kind = "web"
previewPath = "/"
title = "Energybase Solar Calculator"
version = "1.0.0"
id = "artifacts/energybase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20893

[services.development]
run = "pnpm --filter @workspace/energybase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/energybase", "run", "build" ]
publicDir = "artifacts/energybase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20893"
BASE_PATH = "/"
